<body>

  <form>
    <!-- Label with for attribute -->

    <input type="text" id="username" name="username">

    <br><br>

    <!-- Label wrapping input -->
    <label>
      Password:
      <input type="password" name="password">
    </label>
  </form>

</body>
</html>
